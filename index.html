<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SanityDash - Todo App</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon.png">
    <link rel="stylesheet" href="styles.css">
    <script>
        // Auth check - redirect to login if not authenticated
        (function() {
            const token = localStorage.getItem('sanityDashToken');
            if (!token) {
                window.location.href = '/login.html';
            }
        })();
    </script>
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="logo">
                <img src="assets/logo/logo.svg" alt="SanityDash Logo">
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="sidebar-btn" data-page="invoer">
                    <img src="assets/icons/chat-circle-plus.svg" alt="Invoer">
                </a>
                <a href="#" class="sidebar-btn" data-page="triage">
                    <img src="assets/icons/package-alt.svg" alt="Triage">
                    <span class="sidebar-badge" id="triageBadge"></span>
                </a>
                <a href="#" class="sidebar-btn sidebar-btn--active" data-page="overzicht">
                    <img src="assets/icons/pinpaper.svg" alt="Overzicht">
                </a>
                <a href="#" class="sidebar-btn" data-page="profiel">
                    <img src="assets/icons/profile.svg" alt="Profiel">
                </a>
            </nav>
        </aside>

        <!-- INVOER PAGINA -->
        <main class="page page--invoer" id="pageInvoer">
            <div class="invoer-container">
                <textarea class="invoer-textarea" id="transcriptInput" placeholder="Plak hier je transcript of notities..."></textarea>
                <div class="invoer-loader hidden" id="invoerLoader">
                    <div class="loader-spinner"></div>
                </div>
            </div>
        </main>

        <!-- PROFIEL PAGINA -->
        <main class="page page--profiel" id="pageProfiel">
            <div class="profiel-container">
                <textarea class="profiel-textarea" id="contactenTextarea" placeholder="Voer hier alle namen in, gescheiden door een komma..."></textarea>
            </div>
        </main>

        <!-- TRIAGE PAGINA -->
        <main class="page page--triage" id="pageTriage">
            <div class="triage-container">
                <div class="triage-inbox">
                    <div class="triage-inbox-list" id="triageInboxList">
                        <div class="task-card task-card--icon">
                            <img src="assets/icons/package-alt.svg" alt="Inbox" class="column-icon">
                        </div>
                    </div>
                </div>
                <div class="triage-zones">
                    <div class="triage-zone" data-zone="planning">
                        <div class="triage-zone-list" id="triageZonePlanning">
                            <div class="task-card task-card--icon">
                                <img src="assets/icons/calendar-date.svg" alt="Plannen" class="column-icon">
                            </div>
                        </div>
                    </div>
                    <div class="triage-zone" data-zone="bellen">
                        <div class="triage-zone-list" id="triageZoneBellen">
                            <div class="task-card task-card--icon">
                                <img src="assets/icons/call.svg" alt="Bellen" class="column-icon">
                            </div>
                        </div>
                    </div>
                    <div class="triage-zone" data-zone="mailen">
                        <div class="triage-zone-list" id="triageZoneMailen">
                            <div class="task-card task-card--icon">
                                <img src="assets/icons/message.svg" alt="Mailen" class="column-icon">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- OVERZICHT PAGINA -->
        <main class="page page--overzicht active" id="pageOverzicht">
        <div class="columns">
            <!-- PLANNEN kolom -->
            <section class="column" data-category="planning">
                <div class="tasks-grid">
                    <div class="task-card task-card--icon">
                        <img src="assets/icons/calendar-date.svg" alt="Plannen" class="column-icon">
                    </div>
                    <div class="task-card task-card--add">
                        <button class="add-btn"><img src="assets/icons/add.svg" alt="Toevoegen"></button>
                    </div>
                </div>
            </section>

            <!-- BELLEN kolom -->
            <section class="column" data-category="bellen">
                <div class="tasks-grid">
                    <div class="task-card task-card--icon">
                        <img src="assets/icons/call.svg" alt="Bellen" class="column-icon">
                    </div>
                    <div class="task-card task-card--add">
                        <button class="add-btn"><img src="assets/icons/add.svg" alt="Toevoegen"></button>
                    </div>
                </div>
                <div class="column-summary" id="bellenSummary">
                    <span class="summary-text"></span>
                    <button class="summary-copy-btn" title="Kopieer naar klembord">
                        <img src="assets/icons/pinpaper.svg" alt="Kopieer">
                    </button>
                </div>
            </section>

            <!-- MAILEN kolom -->
            <section class="column" data-category="mailen">
                <div class="tasks-grid">
                    <div class="task-card task-card--icon">
                        <img src="assets/icons/message.svg" alt="Mailen" class="column-icon">
                    </div>
                    <div class="task-card task-card--add">
                        <button class="add-btn"><img src="assets/icons/add.svg" alt="Toevoegen"></button>
                    </div>
                </div>
                <div class="column-summary" id="mailenSummary">
                    <span class="summary-text"></span>
                    <button class="summary-copy-btn" title="Kopieer naar klembord">
                        <img src="assets/icons/pinpaper.svg" alt="Kopieer">
                    </button>
                </div>
            </section>
        </div>
        </main>
    </div>

    <!-- Edit Drop Zone -->
    <div class="edit-drop-zone" id="editDropZone">
        <img src="assets/icons/check-circle.svg" alt="Afvinken">
    </div>

    <!-- Edit Modal -->
    <div class="edit-modal" id="editModal">
        <div class="edit-modal-content">
            <!-- Planning task input (single field) -->
            <input type="text" class="edit-input" id="editInput" placeholder="">

            <!-- Contact task inputs (two fields) -->
            <div class="edit-contact-fields hidden" id="contactFields">
                <input type="text" class="edit-input" id="editContactName" placeholder="Wie">
                <input type="text" class="edit-input" id="editContactTask" placeholder="Taak">
            </div>

            <div class="edit-time-selector" id="timeSelector">
                <button class="time-btn" data-time="15">15m</button>
                <button class="time-btn" data-time="30">30m</button>
                <button class="time-btn" data-time="60">1u</button>
                <button class="time-btn" data-time="120">2u</button>
            </div>
            <div class="edit-actions">
                <button class="edit-action-btn edit-action-btn--delete" id="editDelete">
                    <img src="assets/icons/trash.svg" alt="Verwijderen">
                </button>
                <button class="edit-action-btn edit-action-btn--confirm" id="editConfirm">
                    <img src="assets/icons/arrow-right.svg" alt="Bevestigen">
                </button>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
